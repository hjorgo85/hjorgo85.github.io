---
deployment:
  tasks:
    - export DEPLOYPATH=/home/sealifee/sealifeplanet.com/
    - /usr/local/cpanel/3rdparty/bin/git pull origin master
    - /bin/cp -R . $DEPLOYPATH
    - /usr/bin/rsync -a --delete assets/ $DEPLOYPATH/assets/
    - /bin/rm -rf $DEPLOYPATH/.git $DEPLOYPATH/.github $DEPLOYPATH/_build $DEPLOYPATH/.gitignore $DEPLOYPATH/.cpanel.yml $DEPLOYPATH/node_modules
